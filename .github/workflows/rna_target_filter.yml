name: RNA抗微生物靶点筛选（抗细菌/抗病毒/抗虫）
on:
  # 支持两种触发方式：1. 手动触发 2. main分支推送时自动触发
  workflow_dispatch:
    inputs:
      excel_file_path:
        description: "PDB数据Excel文件路径（默认根目录）"
        required: true
        default: "PDB_Dataset_Info_Full.xlsx"
        type: string
  push:
    branches: [ main ]
    paths:
      - "PDB_Dataset_Info_Full.xlsx"  # 只有Excel文件更新时才自动运行

jobs:
  filter-rna-targets:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 读取仓库代码
      actions: write  # 上传产物
    steps:
      # 步骤1：拉取仓库代码
      - name: 检出仓库代码
        uses: actions/checkout@v5

      # 步骤2：设置Python环境（3.11稳定版）
      - name: 配置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"  # 缓存pip依赖，加速下次安装

      # 步骤3：安装依赖包（pandas、可视化库等）
      - name: 安装筛选所需依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：运行RNA靶点筛选脚本
      - name: 执行抗微生物RNA靶点筛选
        run: |
          python filter_antimicrobial_rna_targets.py ${{ github.event.inputs.excel_file_path }}

      # 步骤5：上传筛选结果（Excel/CSV/图表/报告）
      - name: 上传筛选结果文件
        uses: actions/upload-artifact@v5
        with:
          name: RNA抗微生物靶点筛选结果
          path: target_filter_results/  # 结果统一放在这个目录下
          retention-days: 30  # 结果保留30天，足够下载
          if-no-files-found: warn  # 若无结果文件，仅警告不失败
