name: 全RNA靶点药物重定位分析
on:
  # 手动触发运行
  workflow_dispatch:
    inputs:
      similarity_threshold:
        description: '药物相似度阈值 (%)'
        required: true
        default: '40'
        type: string

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    # 强制使用Node.js 24，提前解决弃用问题
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v5  # 升级到支持Node.js 24的版本

      - name: 设置Python环境
        uses: actions/setup-python@v6  # 升级到支持Node.js 24的版本
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行全RNA药物重定位分析
        run: |
          python auto_antibacterial_discovery.py

      - name: 上传分析结果
        uses: actions/upload-artifact@v5  # 升级到支持Node.js 24的版本
        with:
          name: 全RNA药物重定位分析结果
          path: all_rna_drug_discovery_results/  # 修复：更新为新的输出目录
          retention-days: 30  # 结果保留30天
