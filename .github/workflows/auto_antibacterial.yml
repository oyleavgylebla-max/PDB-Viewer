name: 全自动抗菌药物靶点发现
on:
  # 手动触发运行
  workflow_dispatch:
    inputs:
      similarity_threshold:
        description: '药物相似度阈值 (%)'
        required: true
        default: '70'
        type: string

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行自动化分析
        run: |
          python auto_antibacterial_discovery.py

      - name: 上传分析结果
        uses: actions/upload-artifact@v4
        with:
          name: 抗菌药物发现结果
          path: antibacterial_results/
          retention-days: 30  # 结果保留30天
