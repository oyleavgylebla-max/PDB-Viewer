# RNA 靶点 AIDD 老药新用 全自动云端工作流
# GitHub Actions 自动运行 → 自动出结果
name: RNA-AIDD 自动化分析工作流

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动点一下运行

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests tqdm openpyxl

      - name: 运行 AIDD 全自动分析
        run: python rna_aidd_workflow.py

      - name: 上传分析结果
        uses: actions/upload-artifact@v4
        with:
          name: RNA-AIDD-分析结果
          path: rna_aidd_workflow_output/
